<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="Gestor de Votos — Plataforma premium de gestão eleitoral, controle de cabos eleitorais e inteligência de base eleitoral." />
    <meta name="keywords" content="eleições, gestão eleitoral, cabos eleitorais, política, campanha eleitoral, gestor de votos" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gestor de Votos — Inteligência Eleitoral" />
    <meta property="og:description" content="Gerencie sua base de eleitores, coordene cabos eleitorais e visualize dados geográficos da sua campanha em tempo real." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Gestor de Votos — Inteligência Eleitoral" />
    <meta property="twitter:description" content="Gerencie sua base de eleitores, coordene cabos eleitorais e visualize dados geográficos da sua campanha em tempo real." />
    <meta property="twitter:image" content="/icon-512.png" />

    <!-- iOS / PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestor Votos">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png">
    
    <!-- Cores da barra de navegação/status (Light/Dark dinâmico) -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#4f46e5" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1b4b" />
    
    <!-- Fonte principal, carregada SEM bloquear o primeiro paint.
         Antes era um <link rel="stylesheet"> síncrono: o Chrome não pinta NADA
         (nem o loader inline abaixo, que não depende de fonte nenhuma) enquanto uma
         folha de estilo em <head> não termina de carregar — em 4G isso significa
         esperar DNS+TLS+request para um domínio de terceiros só para mostrar a tela
         de abertura. O truque abaixo (media="print" até o onload trocar para "all")
         faz o navegador buscar o CSS em paralelo sem travar a renderização; a
         <noscript> mantém o carregamento normal caso o JS esteja desligado. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preconecta com a API (Render): adianta DNS+TLS+TCP para o primeiro
         request (login/health), que é justo quando o cold start já pesa. -->
    <link rel="preconnect" href="%VITE_API_URL%" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <title>Gestor de Votos</title>
  </head>
  <body>
    <script>
      (function() {
        var ua = window.navigator.userAgent;
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /android/i.test(ua);
        if (isIOS) document.documentElement.classList.add('is-ios');
        if (isAndroid) document.documentElement.classList.add('is-android');
        // Detecta standalone mode (instalado como PWA)
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
          document.documentElement.classList.add('is-pwa');
        }
      })();
    </script>
    <div id="root">
      <style>
        /* Fundo na COR DO APP já no primeiro paint: o splash nativo do Android
           (background_color do manifest) também é #4f46e5, então a sequência
           splash nativo -> este loader -> login não tem nenhum "pulo" de cor.
           Tudo aqui vive dentro de #root e é descartado quando o React monta. */
        body, html { margin: 0; padding: 0; background-color: #4f46e5; height: 100vh; width: 100vw; }
        #initial-loader {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          z-index: 99999;
          font-family: system-ui, -apple-system, sans-serif;
          background: #4f46e5;
        }
        .loader-logo-container {
          width: 96px; height: 96px; border-radius: 22px;
          overflow: hidden;
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.25), 0 8px 10px -6px rgba(0, 0, 0, 0.25);
          animation: logo-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
          margin-bottom: 32px;
        }
        .loader-logo { width: 100%; height: 100%; display: block; }
        .spinner {
          width: 36px; height: 36px; border-radius: 50%;
          border: 4px solid rgba(255, 255, 255, 0.25);
          border-top-color: #ffffff;
          animation: spin 0.9s linear infinite;
        }
        .loader-text {
          margin-top: 16px; color: rgba(255, 255, 255, 0.85);
          font-size: 15px; font-weight: 500; letter-spacing: 0.5px;
          animation: pulse-text 2s ease-in-out infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes logo-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .85; transform: scale(0.96); } }
        @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      </style>
      <div id="initial-loader">
        <div class="loader-logo-container">
          <img src="/icon-192.png" alt="Logo" class="loader-logo" />
        </div>
        <div class="spinner"></div>
        <div class="loader-text">Carregando Gestor de Votos...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
