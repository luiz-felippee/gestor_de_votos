<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="Gestor de Votos — Plataforma premium de gestão eleitoral, controle de cabos eleitorais e inteligência de base eleitoral." />
    <meta name="keywords" content="eleições, gestão eleitoral, cabos eleitorais, política, campanha eleitoral, gestor de votos" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gestor de Votos — Inteligência Eleitoral" />
    <meta property="og:description" content="Gerencie sua base de eleitores, coordene cabos eleitorais e visualize dados geográficos da sua campanha em tempo real." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Gestor de Votos — Inteligência Eleitoral" />
    <meta property="twitter:description" content="Gerencie sua base de eleitores, coordene cabos eleitorais e visualize dados geográficos da sua campanha em tempo real." />
    <meta property="twitter:image" content="/icon-512.png" />

    <!-- iOS / PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestor Votos">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <!-- Cores da barra de navegação/status (Light/Dark dinâmico) -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#4f46e5" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1b4b" />
    
    <!-- Preload fonte principal para eliminar FOIT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Gestor de Votos</title>
  </head>
  <body>
    <script>
      (function() {
        var ua = window.navigator.userAgent;
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /android/i.test(ua);
        if (isIOS) document.documentElement.classList.add('is-ios');
        if (isAndroid) document.documentElement.classList.add('is-android');
        // Detecta standalone mode (instalado como PWA)
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
          document.documentElement.classList.add('is-pwa');
        }
      })();
    </script>
    <div id="root">
      <style>
        body, html { margin: 0; padding: 0; background-color: #f8fafc; height: 100vh; width: 100vw; }
        @media (prefers-color-scheme: dark) { body, html { background-color: #020617; } }
        #initial-loader {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          z-index: 99999;
          font-family: system-ui, -apple-system, sans-serif;
          background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
        }
        .loader-logo-container {
          width: 96px; height: 96px; border-radius: 20px;
          background-color: #4f46e5;
          display: flex; align-items: center; justify-content: center;
          overflow: hidden;
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
          animation: logo-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
          margin-bottom: 32px;
        }
        .loader-logo { width: 110%; height: 110%; object-fit: cover; transform: scale(1.1); }
        .spinner {
          width: 40px; height: 40px; border-radius: 50%;
          border: 4px solid rgba(255, 255, 255, 0.1);
          border-top-color: #ffffff;
          animation: spin 1s linear infinite;
        }
        .loader-text {
          margin-top: 16px; color: rgba(255, 255, 255, 0.8);
          font-size: 15px; font-weight: 500; letter-spacing: 0.5px;
          animation: pulse-text 2s ease-in-out infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes logo-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .8; transform: scale(0.95); } }
        @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      </style>
      <div id="initial-loader">
        <div class="loader-logo-container">
          <img src="/icon-192.png" alt="Logo" class="loader-logo" />
        </div>
        <div class="spinner"></div>
        <div class="loader-text">Carregando Gestor de Votos...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
