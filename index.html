<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="description" content="Gestor de Votos — Plataforma premium de gestão eleitoral, controle de cabos eleitorais e inteligência de base eleitoral." />
    <meta name="keywords" content="eleições, gestão eleitoral, cabos eleitorais, política, campanha eleitoral, gestor de votos" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gestor de Votos — Inteligência Eleitoral" />
    <meta property="og:description" content="Gerencie sua base de eleitores, coordene cabos eleitorais e visualize dados geográficos da sua campanha em tempo real." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Gestor de Votos — Inteligência Eleitoral" />
    <meta property="twitter:description" content="Gerencie sua base de eleitores, coordene cabos eleitorais e visualize dados geográficos da sua campanha em tempo real." />
    <meta property="twitter:image" content="/logo.png" />

    <!-- iOS / PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    
    <!-- Cores da barra de navegação/status (Light/Dark dinâmico) -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020617" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Gestor de Votos</title>
    <!-- Google Identity Services (login com Google) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <script>
      (function() {
        var ua = window.navigator.userAgent;
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /android/i.test(ua);
        if (isIOS) document.documentElement.classList.add('is-ios');
        if (isAndroid) document.documentElement.classList.add('is-android');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
