name: Manter API acordada

# Pinga a API a cada ~10 min para o Render (plano grátis) não colocar
# o servidor "para dormir" — evita a demora de ~50s na primeira visita.
# (10 min dá margem porque o cron do GitHub costuma atrasar alguns minutos.)
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pingar /api/health
        run: |
          curl -fsS --max-time 60 https://gestor-votos-api.onrender.com/api/health \
            && echo " — API respondeu" \
            || echo "API não respondeu (pode estar acordando)"
