name: Manter API acordada

# Pinga /api/health a cada ~5 min. O endpoint toca o banco (SELECT 1), então
# mantém acordados juntos o Render (dorme em ~15 min) E o Neon (suspende em ~5 min).
# Obs.: o GitHub Actions só roda no mínimo a cada 5 min e às vezes atrasa — para
# ZERO cold start do Neon, use um UptimeRobot/cron-job.org (1-3 min) ou plano pago.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pingar /api/health
        run: |
          curl -fsS --max-time 60 https://gestor-votos-api.onrender.com/api/health \
            && echo " — API respondeu" \
            || echo "API não respondeu (pode estar acordando)"
