# Blueprint do Render para a API (pasta backend/ — Express + Prisma + PostgreSQL).
# No Render: New + > Blueprint > aponte para este repositório.
services:
  - type: web
    name: gestor-votos-api
    runtime: node
    plan: free
    rootDir: backend
    # IMPORTANTE: o Render usa o Build Command salvo no PAINEL (Settings), não este arquivo,
    # a menos que você sincronize o Blueprint. Mantenha os dois iguais.
    # --accept-data-loss é necessário porque o diff dropa tabelas/colunas (remoção do WhatsApp).
    # Para zerar tudo num deploy: troque por "... db push --force-reset --accept-data-loss" e
    # reverta depois.
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Cole a connection string do Neon (com sslmode=require)
      - key: DATABASE_URL
        sync: false
      # Gerado automaticamente pelo Render
      - key: JWT_SECRET
        generateValue: true
      # URL do front no Netlify (ex.: https://seu-app.netlify.app) — pode ter várias separadas por vírgula
      - key: CORS_ORIGIN
        sync: false
      # Cria/atualiza o primeiro admin automaticamente ao subir
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
