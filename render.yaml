# Blueprint do Render para a API (pasta backend/ — Express + Prisma + PostgreSQL).
# No Render: New + > Blueprint > aponte para este repositório.
services:
  - type: web
    name: gestor-votos-api
    runtime: node
    plan: free
    rootDir: backend
    # Build NÃO toca no banco (db push tirado daqui: estava falhando ao conectar no
    # Neon durante o build). O código novo funciona com o schema atual — colunas/tabelas
    # extras (WhatsApp) são ignoradas pelo Prisma. Sync do schema é feito à parte.
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Cole a connection string do Neon (com sslmode=require)
      - key: DATABASE_URL
        sync: false
      # Gerado automaticamente pelo Render
      - key: JWT_SECRET
        generateValue: true
      # URL do front no Netlify (ex.: https://seu-app.netlify.app) — pode ter várias separadas por vírgula
      - key: CORS_ORIGIN
        sync: false
      # Cria/atualiza o primeiro admin automaticamente ao subir
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
