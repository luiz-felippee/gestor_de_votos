# Blueprint do Render para a API (pasta server/).
# No Render: New + > Blueprint > aponte para este repositório.
services:
  - type: web
    name: gestor-votos-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Cole a connection string do Neon (com sslmode=require)
      - key: DATABASE_URL
        sync: false
      # Gerado automaticamente pelo Render
      - key: JWT_SECRET
        generateValue: true
      # URL do front no Netlify (ex.: https://seu-app.netlify.app) — pode ter várias separadas por vírgula
      - key: CORS_ORIGIN
        sync: false
      # Cria as tabelas automaticamente no primeiro deploy
      - key: AUTO_MIGRATE
        value: 'true'
      # Cria o primeiro admin automaticamente
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
