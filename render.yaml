# Blueprint do Render para a API (pasta backend/ — Express + Prisma + PostgreSQL).
# No Render: New + > Blueprint > aponte para este repositório.
services:
  - type: web
    name: gestor-votos-api
    runtime: node
    plan: free
    rootDir: backend
    # Gera o Prisma Client e sincroniza as tabelas no banco (Neon) no deploy
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Cole a connection string do Neon (com sslmode=require)
      - key: DATABASE_URL
        sync: false
      # Gerado automaticamente pelo Render
      - key: JWT_SECRET
        generateValue: true
      # URL do front no Netlify (ex.: https://seu-app.netlify.app) — pode ter várias separadas por vírgula
      - key: CORS_ORIGIN
        sync: false
      # Cria/atualiza o primeiro admin automaticamente ao subir
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
