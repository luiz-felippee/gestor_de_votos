<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><link rel="stylesheet" href="estilo.css"></head>
<body style="background:var(--slate-100)"><div style="display:flex;justify-content:center;padding:40px 16px">
  <div style="width:520px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);border:1px solid var(--slate-200)">
    <div style="position:relative;height:150px;background:linear-gradient(to right,#4f46e5,#6366f1,#7c3aed)">
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.2)"></div>
      <div style="position:absolute;bottom:-40px;left:28px;height:80px;width:80px;border-radius:18px;border:4px solid #fff;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px -8px rgba(0,0,0,.3)">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="#4f46e5" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19 8v6M22 11h-6"/></svg></div>
    </div>
    <div style="padding:52px 28px 24px">
      <h1 style="font-size:24px;font-weight:800;color:var(--slate-900)">Apoio à Campanha</h1>
      <p style="margin-top:4px;font-size:13.5px;font-weight:600;color:var(--brand-600)">Indicação de Maria Souza</p>
    </div>
    <div style="padding:0 28px 28px">
      <div class="legend-sec">Dados do eleitor</div>
      <div class="field"><label>Nome completo <span class="req">*</span></label><input class="input" value="José da Silva"></div>
      <div class="field"><label>Telefone / WhatsApp <span class="req">*</span></label><input class="input" value="(81) 99812-3344"></div>
      <div class="field"><label>Data de Nascimento (Opcional)</label><input class="input" value="15/06/1979"></div>
      <div class="field"><label>CEP</label><input class="input" value="51020-000"></div>
      <div class="grid g2">
        <div class="field"><label>CPF (Opcional)</label><input class="input" value="042.xxx.xxx-10"></div>
        <div class="field"><label>Título de Eleitor (Opcional)</label><input class="input" placeholder="Apenas números" style="color:var(--slate-400)"></div>
      </div>

      <div class="legend-sec">Local de votação</div>
      <div class="field"><label>Local de votação <span class="req">*</span></label><input class="input" value="E.E. Presidente Kennedy"></div>
      <div class="grid g2">
        <div class="field"><label>Zona <span class="req">*</span></label><input class="input" value="003"></div>
        <div class="field"><label>Seção <span class="req">*</span></label><input class="input" value="0142"></div>
      </div>
      <div class="grid g2">
        <div class="field"><label>Bairro <span class="req">*</span></label><input class="input" value="Boa Viagem"></div>
        <div class="field"><label>Cidade <span class="req">*</span></label><input class="input" value="Recife"></div>
      </div>

      <div class="legend-sec">Indicação</div>
      <div class="field"><label>Quem indicou este eleitor? <span class="req">*</span></label><input class="input" value="Maria Souza" style="background:var(--slate-100)">
        <span style="display:block;margin-top:5px;font-size:12px;color:var(--brand-600)">Indicação preenchida automaticamente pelo link.</span></div>

      <label style="display:flex;gap:8px;font-size:13px;color:var(--slate-600);margin:8px 0 18px"><input type="checkbox" checked> <span>Autorizo o uso dos meus dados para fins da campanha, conforme a <b style="color:var(--brand-600);text-decoration:underline">Política de Privacidade (LGPD)</b>.</span></label>
      <button class="btn btn-primary" style="width:100%;padding:14px">Cadastrar eleitor</button>
    </div>
  </div>
</div></body></html>
