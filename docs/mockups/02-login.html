<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><link rel="stylesheet" href="estilo.css"></head>
<body><div style="display:flex;min-height:720px">
  <!-- Branding -->
  <div style="flex:1;position:relative;background:linear-gradient(135deg,#312e81,#0f172a 60%,#1e1b4b);color:#fff;overflow:hidden">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px"></div>
    <div style="position:absolute;top:64px;left:64px;display:flex;align-items:center;gap:12px">
      <span class="brand-ico" style="height:48px;width:48px"><svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></span>
      <span style="font-size:24px;font-weight:800">Gestor de Votos</span></div>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:64px">
      <div style="max-width:520px">
        <h1 style="font-size:48px;font-weight:800;line-height:1.1;margin-bottom:24px">A inteligência por trás de campanhas vitoriosas.</h1>
        <p style="font-size:18px;color:var(--slate-300);font-weight:500">Gestor de Votos é a plataforma completa para gerenciamento de lideranças, eleitores e comunicação via WhatsApp.</p>
      </div>
    </div>
  </div>
  <!-- Formulário -->
  <div style="width:540px;display:flex;flex-direction:column;justify-content:center;padding:48px 64px;background:#fff">
    <div style="max-width:360px;margin:0 auto;width:100%">
      <h2 style="font-size:30px;font-weight:800;color:var(--slate-900)">Bem-vindo de volta</h2>
      <p style="margin-top:8px;font-size:14px;color:var(--slate-500);font-weight:500;margin-bottom:36px">Faça login para acessar o painel de controle da campanha.</p>
      <div class="field"><label>E-mail</label><input class="input" value="miguel@campanha.com.br" style="padding:12px"></div>
      <div class="field"><label>Senha</label><input class="input" value="••••••••••" style="padding:12px"></div>
      <button class="btn btn-primary" style="width:100%;padding:14px;border-radius:12px;margin-top:8px">Entrar na Plataforma</button>
      <button class="btn btn-ghost" style="width:100%;padding:14px;border-radius:12px;margin-top:12px">Criar Nova Conta</button>
    </div>
  </div>
</div></body></html>
