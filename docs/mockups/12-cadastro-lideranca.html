<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><link rel="stylesheet" href="estilo.css"></head>
<body style="background:var(--slate-100)"><div style="display:flex;justify-content:center;padding:40px 16px">
  <div style="width:520px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);border:1px solid var(--slate-200)">
    <div style="position:relative;height:150px;background:linear-gradient(to right,#0d9488,#14b8a6,#06b6d4)">
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.2)"></div>
      <div style="position:absolute;bottom:-40px;left:28px;height:80px;width:80px;border-radius:18px;border:4px solid #fff;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px -8px rgba(0,0,0,.3)">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="#0d9488" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 10-4-4 4 4 0 004 4zm6 0a3 3 0 10-3-3"/></svg></div>
    </div>
    <div style="padding:52px 28px 24px">
      <h1 style="font-size:24px;font-weight:800;color:var(--slate-900)">Seja uma Liderança</h1>
      <p style="margin-top:4px;font-size:13.5px;font-weight:500;color:var(--slate-500)">Preencha seus dados para fazer parte do time de lideranças da campanha.</p>
    </div>
    <div style="padding:0 28px 28px">
      <div class="legend-sec teal">Seus Dados</div>
      <div class="field"><label>Sua Foto <span class="req">*</span></label><span style="display:inline-block;background:#ccfbf1;color:#0f766e;font-weight:700;font-size:13px;padding:8px 14px;border-radius:9px">Escolher arquivo</span></div>
      <div class="field"><label>Nome completo <span class="req">*</span></label><input class="input" value="João Silva"></div>
      <div class="field"><label>WhatsApp / Telefone <span class="req">*</span></label><input class="input" value="(81) 98822-1100"></div>
      <div class="field"><label>Data de Nascimento (Opcional)</label><input class="input" value="08/09/1982"></div>

      <div class="legend-sec teal">Local de Atuação</div>
      <div class="field"><label>Bairro Principal <span class="req">*</span></label><input class="input" value="Casa Amarela"></div>
      <div class="field"><label>Cidade <span class="req">*</span></label><input class="input" value="Recife"></div>

      <div class="legend-sec teal">Histórico Político</div>
      <label style="display:flex;gap:8px;font-size:13.5px;font-weight:600;color:var(--slate-700);margin-bottom:18px"><input type="checkbox" checked> Já foi candidato(a) a algum cargo?</label>
      <div class="grid g2">
        <div class="field"><label>Qual cargo?</label><input class="input" value="Vereador"></div>
        <div class="field"><label>Ano da Eleição</label><input class="input" value="2016"></div>
      </div>

      <button class="btn btn-teal" style="width:100%;padding:14px">Quero ser Liderança</button>
    </div>
  </div>
</div></body></html>
